name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json
          
      - name: Install dependencies
        working-directory: docs-site
        run: npm ci
        
      - name: Generate TypeDoc API documentation
        working-directory: docs-site
        run: npm run gen-api
        
      - name: Build VitePress site
        working-directory: docs-site
        run: vitepress build docs
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/docs/.vitepress/dist
          
  validate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json
          
      - name: Install dependencies
        working-directory: docs-site
        run: npm ci
        
      - name: Validate links
        working-directory: docs-site
        run: npm run validate:links
        continue-on-error: true
        
      - name: Check accessibility
        working-directory: docs-site
        run: |
          echo "Accessibility checks would run here (warnings only, non-blocking)"
          echo "Future: Implement pa11y or axe-core checks"
        continue-on-error: true
          
  deploy:
    needs: [build, validate]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
