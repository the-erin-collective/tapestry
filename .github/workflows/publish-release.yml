name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build

      - name: Cleanup intermediate JARS
        run: rm -f build/libs/*-dev.jar build/libs/*-sources.jar build/libs/*-raw.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/tapestry-*.jar
            types.d.ts
          prerelease: true
          generate_release_notes: true
          name: Tapestry ${{ github.ref_name }} (Alpha)
          body: |
            ## Tapestry Minecraft Modding Framework
            
            This is an alpha release of the Tapestry framework.
            
            ### Installation
            1. Download the `tapestry-*-shadow.jar` file.
            2. Place it in your Minecraft `mods` folder.
            3. Ensure you have the Fabric Loader and Fabric API installed for Minecraft 1.21.1.
            
            ### Developer Assets
            The `types.d.ts` file is provided for TypeScript mod development.
