<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100"><defs><marker id="arrowhead" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="3"><path fill="#14b8a6" d="m0 0 10 3L0 6z"/></marker><style>.phase-box{fill:#fff;stroke:#1e40af;stroke-width:2}.phase-header{fill:#1e40af}.phase-detail,.phase-name{font-family:system-ui,-apple-system,sans-serif}.phase-name{fill:#fff;font-size:14px;font-weight:600}.phase-detail{fill:#4b5563;font-size:11px}.arrow{fill:none;stroke:#14b8a6;stroke-width:3;marker-end:url(#arrowhead)}</style></defs><text x="450" y="35" style="fill:#1f2937;font-family:system-ui,-apple-system,sans-serif;font-size:22px;font-weight:600" text-anchor="middle">Tapestry Lifecycle Phases</text><path d="M50 60h800v70H50z" class="phase-box"/><path d="M50 60h800v25H50z" class="phase-header"/><text x="450" y="78" class="phase-name" text-anchor="middle">BOOTSTRAP</text><text x="60" y="105" class="phase-detail">Core initialization: API registry, TypeScript runtime, mod registry</text><text x="60" y="120" class="phase-detail">✓ Framework setup  ✗ Extension registration, API calls, mod operations</text><path d="M450 130v20" class="arrow"/><path d="M50 150h800v70H50z" class="phase-box"/><path d="M50 150h800v25H50z" class="phase-header"/><text x="450" y="168" class="phase-name" text-anchor="middle">DISCOVERY</text><text x="60" y="195" class="phase-detail">Extension scanning: Discover extension providers via Fabric entrypoints</text><text x="60" y="210" class="phase-detail">✓ Extension discovery  ✗ Extension registration, API calls, mod operations</text><path d="M450 220v20" class="arrow"/><path d="M50 240h800v70H50z" class="phase-box"/><path d="M50 240h800v25H50z" class="phase-header"/><text x="450" y="258" class="phase-name" text-anchor="middle">VALIDATION</text><text x="60" y="285" class="phase-detail">Extension validation: Check dependencies, capabilities, freeze registries</text><text x="60" y="300" class="phase-detail">✓ Descriptor validation, dependency checks  ✗ Extension registration, API calls</text><path d="M450 310v20" class="arrow"/><path d="M50 330h800v70H50z" class="phase-box"/><path d="M50 330h800v25H50z" class="phase-header"/><text x="450" y="348" class="phase-name" text-anchor="middle">REGISTRATION</text><text x="60" y="375" class="phase-detail">API domain declaration: Extensions register APIs, hooks, and services</text><text x="60" y="390" class="phase-detail">✓ API/hook/service registration  ✗ Calling registered APIs, mod operations</text><path d="M450 400v20" class="arrow"/><path d="M50 420h800v70H50z" class="phase-box"/><path d="M50 420h800v25H50z" class="phase-header"/><text x="450" y="438" class="phase-name" text-anchor="middle">FREEZE</text><text x="60" y="465" class="phase-detail">API shape sealed: All registries frozen, API tree becomes immutable</text><text x="60" y="480" class="phase-detail">✓ Internal freezing  ✗ Registering new APIs, modifying API tree, calling APIs</text><path d="M450 490v20" class="arrow"/><path d="M50 510h800v70H50z" class="phase-box"/><path d="M50 510h800v25H50z" class="phase-header"/><text x="450" y="528" class="phase-name" text-anchor="middle">TS_LOAD</text><text x="60" y="555" class="phase-detail">GraalVM starts: Initialize TypeScript runtime, discover mod files</text><text x="60" y="570" class="phase-detail">✓ Mod file discovery, GraalVM init  ✗ Executing mod scripts, API calls</text><path d="M450 580v20" class="arrow"/><path d="M50 600h800v70H50z" class="phase-box"/><path d="M50 600h800v25H50z" class="phase-header"/><text x="450" y="618" class="phase-name" text-anchor="middle">TS_REGISTER</text><text x="60" y="645" class="phase-detail">Mod registration: Evaluate scripts, collect descriptors via mod.define(), validate dependencies</text><text x="60" y="660" class="phase-detail">✓ mod.define(), dependency declaration  ✗ mod.require(), mod.export(), event handlers, game APIs</text><path d="M450 670v20" class="arrow"/><path d="M50 690h800v70H50z" class="phase-box"/><path d="M50 690h800v25H50z" class="phase-header"/><text x="450" y="708" class="phase-name" text-anchor="middle">TS_ACTIVATE</text><text x="60" y="735" class="phase-detail">Dependency resolution: Activate mods in order, process exports and requires</text><text x="60" y="750" class="phase-detail">✓ mod.export(), mod.require()  ✗ Registering new mods, game APIs, event handlers</text><path d="M450 760v20" class="arrow"/><path d="M50 780h800v70H50z" class="phase-box"/><path d="M50 780h800v25H50z" class="phase-header"/><text x="450" y="798" class="phase-name" text-anchor="middle">TS_READY</text><text x="60" y="825" class="phase-detail">onLoad hooks execute: Run mod initialization, register event handlers</text><text x="60" y="840" class="phase-detail">✓ Event handler registration, full API access  ✗ Registering new mods, persistence access</text><path d="M450 850v20" class="arrow"/><path d="M50 870h800v70H50z" class="phase-box"/><path d="M50 870h800v25H50z" class="phase-header"/><text x="450" y="888" class="phase-name" text-anchor="middle">PERSISTENCE_READY</text><text x="60" y="915" class="phase-detail">Persistence backend ready: Initialize state stores, enable mod.state API</text><text x="60" y="930" class="phase-detail">✓ mod.state access, persistent data  ✗ Registering new mods, modifying API shape</text><path d="M450 940v20" class="arrow"/><path d="M50 960h385v60H50z" class="phase-box"/><path d="M50 960h385v25H50z" class="phase-header"/><text x="242" y="978" class="phase-name" text-anchor="middle">EVENT</text><text x="60" y="1005" class="phase-detail">Event system ready: Enable event dispatch</text><path d="M465 960h385v60H465z" class="phase-box"/><path d="M465 960h385v25H465z" class="phase-header"/><text x="657" y="978" class="phase-name" text-anchor="middle">RUNTIME</text><text x="475" y="1005" class="phase-detail">Game logic active: Full gameplay APIs available</text><path d="M242 1020v20h208v10" class="arrow"/><path d="M657 1020v20H450v10" class="arrow"/><path d="M50 1050h800v60H50z" class="phase-box"/><path d="M50 1050h800v25H50z" class="phase-header"/><text x="450" y="1068" class="phase-name" text-anchor="middle">CLIENT_PRESENTATION_READY</text><text x="60" y="1095" class="phase-detail">Client UI ready: Enable overlay registration and rendering (client-side only)</text></svg>