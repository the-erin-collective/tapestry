<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800"><defs><marker id="arrowhead" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="3"><path fill="#14b8a6" d="m0 0 10 3L0 6z"/></marker><style>.box{fill:#fff;stroke:#1e40af;stroke-width:2}.header{fill:#1e40af}.header-text,.small-text{font-family:system-ui,-apple-system,sans-serif}.header-text{fill:#fff;font-size:14px;font-weight:600}.small-text{fill:#4b5563;font-size:11px}.arrow{fill:none;stroke:#14b8a6;stroke-width:2;marker-end:url(#arrowhead)}.phase-label{fill:#0f766e;font-family:system-ui,-apple-system,sans-serif;font-size:12px;font-weight:600}.code{fill:#1f2937;font-family:&quot;Courier New&quot;,monospace;font-size:11px}</style></defs><text x="500" y="35" style="fill:#1f2937;font-family:system-ui,-apple-system,sans-serif;font-size:22px;font-weight:600" text-anchor="middle">Extension System Flow</text><text x="50" y="70" class="phase-label">PHASE 1: DISCOVERY</text><path d="M50 80h400v120H50z" class="box"/><path d="M50 80h400v30H50z" class="header"/><text x="250" y="102" class="header-text" text-anchor="middle">Extension Provider Discovery</text><text x="60" y="130" class="small-text">1. Fabric scans entrypoints for &quot;tapestry:extension&quot;</text><text x="60" y="150" class="small-text">2. Instantiate extension providers</text><text x="60" y="170" class="small-text">3. Call describe() to get descriptors</text><text x="60" y="190" class="small-text">4. Collect all extension metadata</text><path d="M550 80h400v120H550z" class="box"/><path d="M550 80h400v30H550z" class="header"/><text x="750" y="102" class="header-text" text-anchor="middle">Extension Descriptor</text><text x="560" y="130" class="code">TapestryExtensionDescriptor(</text><text x="570" y="145" class="code">  id: &quot;my_extension&quot;,</text><text x="570" y="160" class="code">  capabilities: [...],</text><text x="570" y="175" class="code">  dependencies: [...]</text><text x="560" y="190" class="code">)</text><path d="M450 140h100" class="arrow"/><text x="50" y="240" class="phase-label">PHASE 2: VALIDATION</text><path d="M50 250h280v100H50z" class="box"/><path d="M50 250h280v30H50z" class="header"/><text x="190" y="272" class="header-text" text-anchor="middle">Validate Extensions</text><text x="60" y="300" class="small-text">• Check unique extension IDs</text><text x="60" y="320" class="small-text">• Validate version requirements</text><text x="60" y="340" class="small-text">• Check for circular dependencies</text><path d="M360 250h280v100H360z" class="box"/><path d="M360 250h280v30H360z" class="header"/><text x="500" y="272" class="header-text" text-anchor="middle">Validate Capabilities</text><text x="370" y="300" class="small-text">• Check capability declarations</text><text x="370" y="320" class="small-text">• Verify required capabilities exist</text><text x="370" y="340" class="small-text">• Freeze capability registry</text><path d="M670 250h280v100H670z" class="box"/><path d="M670 250h280v30H670z" class="header"/><text x="810" y="272" class="header-text" text-anchor="middle">Build Dependency Graph</text><text x="680" y="300" class="small-text">• Resolve extension dependencies</text><text x="680" y="320" class="small-text">• Determine registration order</text><text x="680" y="340" class="small-text">• Validate graph is acyclic</text><path d="M250 200v50" class="arrow"/><path d="M190 350v20h310v-20" class="arrow"/><path d="M500 350v20h310v-20" class="arrow"/><text x="50" y="410" class="phase-label">PHASE 3: REGISTRATION</text><path d="M50 420h280v120H50z" class="box"/><path d="M50 420h280v30H50z" class="header"/><text x="190" y="442" class="header-text" text-anchor="middle">Create Extension Instances</text><text x="60" y="470" class="small-text">1. Call provider.create()</text><text x="60" y="490" class="small-text">2. Instantiate extension objects</text><text x="60" y="510" class="small-text">3. Prepare registration context</text><text x="60" y="530" class="small-text">4. Register in dependency order</text><path d="M360 420h280v120H360z" class="box"/><path d="M360 420h280v30H360z" class="header"/><text x="500" y="442" class="header-text" text-anchor="middle">Register APIs</text><text x="370" y="470" class="code">ctx.api().addFunction(</text><text x="380" y="485" class="code">  extensionId,</text><text x="380" y="500" class="code">  &quot;capability.name&quot;,</text><text x="380" y="515" class="code">  executable</text><text x="370" y="530" class="code">)</text><path d="M670 420h280v120H670z" class="box"/><path d="M670 420h280v30H670z" class="header"/><text x="810" y="442" class="header-text" text-anchor="middle">Register Hooks &amp; Services</text><text x="680" y="470" class="small-text">• Register hook bridges</text><text x="680" y="490" class="small-text">• Register services</text><text x="680" y="510" class="small-text">• Build extension registries</text><text x="680" y="530" class="small-text">• Populate API tree</text><path d="M810 370v20H190v30" class="arrow"/><path d="M190 540v20h310v-20" class="arrow"/><path d="M500 540v20h310v-20" class="arrow"/><text x="50" y="600" class="phase-label">PHASE 4: FREEZE</text><path d="M50 610h900v100H50z" class="box"/><path d="M50 610h900v30H50z" class="header"/><text x="500" y="632" class="header-text" text-anchor="middle">Freeze API Shape</text><text x="60" y="660" class="small-text">1. Call onFreeze() on all extensions</text><text x="60" y="680" class="small-text">2. Freeze all registries (API, hook, service)</text><text x="60" y="700" class="small-text">3. Make API tree immutable - no more changes allowed</text><path d="M500 560v50" class="arrow"/><text x="50" y="750" class="phase-label">AFTER FREEZE: TypeScript Mods Can Access APIs</text><path d="M50 760h900v30H50z" class="box"/><text x="500" y="780" style="fill:#1f2937;font-family:system-ui,-apple-system,sans-serif;font-size:13px" text-anchor="middle">tapestry.mods.my_extension.myFunction() → Calls registered extension API</text><path d="M500 710v50" class="arrow"/></svg>