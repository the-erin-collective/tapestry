<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback
    // When GitHub Pages serves this 404, redirect back to the SPA entry point
    const path = location.pathname.replace(/^\/tapestry/, '')
    location.replace('/tapestry/' + (path || '/'))
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
