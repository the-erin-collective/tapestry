<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle representing lifecycle -->
  <circle cx="60" cy="60" r="55" fill="#14b8a6" opacity="0.1"/>
  
  <!-- Outer boundary ring - representing "hard boundaries" -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#14b8a6" stroke-width="3"/>
  
  <!-- Inner geometric pattern - representing structure and TypeScript -->
  <g transform="translate(60, 60)">
    <!-- Four lifecycle phases as segments -->
    <path d="M 0,-35 L 10,-25 L 0,-15 Z" fill="#14b8a6"/>
    <path d="M 35,0 L 25,10 L 15,0 Z" fill="#0d9488"/>
    <path d="M 0,35 L -10,25 L 0,15 Z" fill="#14b8a6"/>
    <path d="M -35,0 L -25,-10 L -15,0 Z" fill="#0d9488"/>
    
    <!-- Central "T" for Tapestry -->
    <rect x="-2" y="-20" width="4" height="30" fill="#1e40af"/>
    <rect x="-12" y="-20" width="24" height="4" fill="#1e40af"/>
  </g>
  
  <!-- Connection lines showing flow between phases -->
  <circle cx="60" cy="60" r="25" fill="none" stroke="#0d9488" stroke-width="2" stroke-dasharray="4,4"/>
</svg>
